<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background -->
  <circle cx="100" cy="100" r="90" fill="#1a1a2e"/>
  <circle cx="100" cy="100" r="85" fill="url(#grad1)"/>
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2d44"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
  </defs>
  
  <!-- Lobster body -->
  <ellipse cx="100" cy="110" rx="50" ry="45" fill="#FF6B35"/>
  <ellipse cx="100" cy="110" rx="45" ry="40" fill="#FF8F5C"/>
  
  <!-- Lobster tail -->
  <ellipse cx="100" cy="155" rx="25" ry="12" fill="#FF6B35"/>
  <ellipse cx="100" cy="165" rx="18" ry="8" fill="#FF6B35"/>
  <ellipse cx="100" cy="172" rx="10" ry="5" fill="#FF6B35"/>
  
  <!-- Claws -->
  <ellipse cx="45" cy="95" rx="25" ry="18" fill="#FF6B35" transform="rotate(-30 45 95)"/>
  <ellipse cx="45" cy="95" rx="20" ry="14" fill="#FFB74D" transform="rotate(-30 45 95)"/>
  
  <ellipse cx="155" cy="95" rx="25" ry="18" fill="#FF6B35" transform="rotate(30 155 95)"/>
  <ellipse cx="155" cy="95" rx="20" ry="14" fill="#FFB74D" transform="rotate(30 155 95)"/>
  
  <!-- Eyes -->
  <circle cx="80" cy="85" r="15" fill="white"/>
  <circle cx="120" cy="85" r="15" fill="white"/>
  <circle cx="83" cy="85" r="8" fill="#1a1a2e"/>
  <circle cx="123" cy="85" r="8" fill="#1a1a2e"/>
  <circle cx="85" cy="83" r="3" fill="white"/>
  <circle cx="125" cy="83" r="3" fill="white"/>
  
  <!-- Cheeks -->
  <circle cx="70" cy="105" r="8" fill="#FFAB91" opacity="0.6"/>
  <circle cx="130" cy="105" r="8" fill="#FFAB91" opacity="0.6"/>
  
  <!-- Smile -->
  <path d="M85 115 Q100 130 115 115" stroke="#1a1a2e" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Antenna -->
  <path d="M85 65 Q80 50 75 45" stroke="#FF6B35" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M115 65 Q120 50 125 45" stroke="#FF6B35" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="75" cy="45" r="5" fill="#FFB74D"/>
  <circle cx="125" cy="45" r="5" fill="#FFB74D"/>
  
  <!-- Legs -->
  <line x1="65" y1="140" x2="55" y2="160" stroke="#FF6B35" stroke-width="4" stroke-linecap="round"/>
  <line x1="85" y1="145" x2="80" y2="165" stroke="#FF6B35" stroke-width="4" stroke-linecap="round"/>
  <line x1="115" y1="145" x2="120" y2="165" stroke="#FF6B35" stroke-width="4" stroke-linecap="round"/>
  <line x1="135" y1="140" x2="145" y2="160" stroke="#FF6B35" stroke-width="4" stroke-linecap="round"/>
</svg>